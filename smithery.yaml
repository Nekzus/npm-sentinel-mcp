runtime: "container"

# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
configSchema:
  type: "object"
  required: []
  properties:
    NPM_REGISTRY_URL:
      type: "string"
      description: "URL of the NPM registry to use (default: https://registry.npmjs.org)"
      default: "https://registry.npmjs.org"

startCommand:
  type: "stdio"
  configSchema:
    type: "object"
    required: []
    properties:
      NPM_REGISTRY_URL:
        type: "string"
        description: "URL of the NPM registry to use (default: https://registry.npmjs.org)"
        default: "https://registry.npmjs.org"
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js'],
      env: {
        NPM_REGISTRY_URL: config.NPM_REGISTRY_URL
      }
    }) 